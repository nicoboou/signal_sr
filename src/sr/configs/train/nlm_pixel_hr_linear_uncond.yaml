space: pixel
seed: 42
image_size: 128
scale: 16
lr_size: 8

data:
  name: nlm
  root: /projects/compures/datasets/NLM/crops
  split_dir: /projects/compures/nicolas/signal_sr/data/nlm/splits/semi_biased/single/seed_2026 # PARASITIZED = 80% / UNINFECTED = 20%
  image_size: 128
  scale: 8
  channels: 3
  split_strategy: train_hr_val_test_lr
  return_pair: false

val_data:
  return_pair: true

test_data:
  return_pair: true

phase_defaults:
  train_file: train_pixel.py
  infer_file: infer.py

denoiser:
  target: diffusers.UNet2DModel
  params:
    sample_size: 128
    in_channels: 3
    out_channels: 3

    layers_per_block: 2
    block_out_channels: [64, 128, 256, 256]

    down_block_types: [DownBlock2D, DownBlock2D, DownBlock2D, AttnDownBlock2D]
    up_block_types: [AttnUpBlock2D, UpBlock2D, UpBlock2D, UpBlock2D]

    # num_class_embeds: 2
    dropout: 0.1
    norm_num_groups: 32

objective:
  name: diffusion
  prediction_type: epsilon

noise_scheduler:
  name: DDPMScheduler
  num_train_timesteps: 1000
  n_infer_steps: 50
  prediction_type: epsilon
  beta_schedule: linear
  beta_start: 0.0001
  beta_end: 0.02
  timestep_spacing: linspace
  clip_sample: true

sampling:
  method: dps
  dps:
    base_sampler: ddpm
    guidance_scale: 12.0
    start_step: 0
    end_step: null
    clip_denoised: true
    loss: l2_norm

train:
  batch_size: 128
  lr: 1e-4
  max_steps: 300000
  mixed_precision: fp16
  log_every: 50
  sample_every: 100
  save_every: 10000

evaluation:
  mind:
    enabled: false
    every: 10000
    real_split: train
    n_samples: 50000
    n_projections: 1000
    rng_seed: 0
    generation_batch_size: 16
    real_batch_size: 16
    feature_batch_size: 32
    weights: DEFAULT
    resize_size: 299
    cache_real_features: true
  fid:
    enabled: false
    every: 10000
    real_split: train
    n_samples: 50000
    rng_seed: 0
    generation_batch_size: 16
    real_batch_size: 16
    feature_batch_size: 32
    weights: DEFAULT
    resize_size: 299
    cache_real_features: true

wandb:
  enabled: true
  project: signal_sr
