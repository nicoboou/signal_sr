space: pixel
seed: 42
image_size: 128
scale: 2
lr_size: 64

data:
  name: synthetic_microscopy
  image_size: 128
  scale: 2
  lr_size: 64
  channels: 1
  split_dir: splits/synthetic_microscopy/train_hr_val_test_lr_seed4
  split_strategy: train_hr_val_test_lr
  split_seed: 0
  split_ratios: [0.80, 0.05, 0.15]
  return_pair: false
  return_labels: true
  return_masks: false
  return_metadata: false

synthetic_generation:
  n_per_combination: 60000
  image_size: 128
  seed: 42
  generator_kwargs:
    parasite_diam: 10
    parasite_values: [0, 1]
    filament_values: [0]
    strong_texture_values: [0]
    poor_texture_amplitude: 0.1
    strong_texture_amplitude: 0.1

val_data:
  return_pair: true

test_data:
  return_pair: true

phase_defaults:
  train_file: train_pixel.py
  infer_file: infer.py

denoiser:
  target: diffusers.UNet2DModel
  params:
    sample_size: 128
    in_channels: 1
    out_channels: 1
    layers_per_block: 2
    block_out_channels: [64, 128, 256]
    down_block_types: [DownBlock2D, DownBlock2D, DownBlock2D]
    up_block_types: [UpBlock2D, UpBlock2D, UpBlock2D]
    num_class_embeds: 2

objective:
  name: diffusion
  prediction_type: epsilon

noise_scheduler:
  name: DDPMScheduler
  num_train_timesteps: 1000
  n_infer_steps: 50
  prediction_type: epsilon
  beta_schedule: linear
  beta_start: 0.0001
  beta_end: 0.02
  timestep_spacing: linspace
  clip_sample: false

sampling:
  method: dps
  dps:
    base_sampler: ddpm
    guidance_scale: 5.0
    start_step: 0
    end_step: null
    clip_denoised: true
    loss: l2_norm

train:
  batch_size: 64
  lr: 1e-4
  max_steps: 200000
  mixed_precision: fp16
  log_every: 50
  sample_every: 200
  save_every: 10000

evaluation:
  mind:
    enabled: true
    every: 10000
    real_split: train
    n_samples: 50000
    n_projections: 1000
    rng_seed: 0
    generation_batch_size: 16
    real_batch_size: 16
    feature_batch_size: 32
    weights: DEFAULT
    resize_size: 299
    cache_real_features: true
  fid:
    enabled: false
    every: 10000
    real_split: train
    n_samples: 50000
    rng_seed: 0
    generation_batch_size: 16
    real_batch_size: 16
    feature_batch_size: 32
    weights: DEFAULT
    resize_size: 299
    cache_real_features: true

wandb:
  enabled: true
  project: spectral_inversion
