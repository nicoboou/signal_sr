# Jean Zay launch config for scripts/submit_jeanzay.py.
# Submit with:
#   python scripts/submit_jeanzay.py sr --jz-config src/sr/configs/train/nlm_pixel_hr_linear_eps_jz.yaml
pipeline: sr
base_config: src/sr/configs/train/nlm_pixel_hr_linear_eps.yaml

job:
  name: sr_nlm_pixel_hr_linear_eps

paths:
  scratch_root: ${WORK}/signal_sr_experiments
  output_root: ${WORK}/signal_sr_experiments/sr/nlm_pixel_hr_linear_eps

runtime:
  # Jean Zay virtualenv created with uv from the CPython install below.
  venv_path: /lustre/fswork/projects/rech/gow/utd56zv/signal_sr/.venv
  uv_python_dir: /lustre/fswork/projects/rech/gow/utd56zv/uv-python/cpython-3.10.16-linux-x86_64-gnu
  launcher: auto

slurm:
  account: wbg@a100
  partition: gpu_p5
  constraint: a100
  qos: qos_gpu_a100-dev
  time_min: 100
  nodes: 1
  tasks_per_node: 1
  gpus: 2
  gres: null
  # The launcher requests gpus_per_node through submitit; reserve 10 CPU/GPU on this job.
  cpus_per_task: 40
  hint: nomultithread

  # account: wbg@h100
  # partition: gpu_p6
  # constraint: h100
  # qos: qos_gpu_h100-t4
  # time_min: 4000
  # nodes: 1
  # tasks_per_node: 1
  # gpus: 4
  # gres: null
  # # The launcher requests gpus_per_node through submitit; reserve 10 CPU/GPU on this job.
  # cpus_per_task: 40
  # hint: nomultithread

data:
  root: ${SCRATCH}/NLM/crops
  split_dir: data/nlm/splits/semi_biased/single/seed_2026

wandb:
  enabled: true
  project: signal_sr
  entity: null

training:
  num_workers: 8
  mixed_precision: fp16
  args: []
